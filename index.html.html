<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPF — Digital Experience Survey</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F6FA;--bg1:#FFFFFF;--bg2:#EEF1F8;
  --gold:#0D7A6B;--gold2:#0FA898;--blue:#1A5CB8;
  --text:#1A2340;--muted:#7A8FA8;--dim:#B0C0CC;
  --bsoft:rgba(26,35,64,0.08);
  --bgold:rgba(13,122,107,0.08);
  --r:12px;--rl:20px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{display:none;}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(120px);opacity:.07;}
.o1{width:600px;height:600px;background:#1A5CB8;top:-150px;right:-150px;}
.o2{width:500px;height:500px;background:#0D7A6B;bottom:-100px;left:-100px;}
.o3{width:350px;height:350px;background:#0FA898;top:35%;right:10%;}
.shell{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 48px;border-bottom:1px solid var(--bsoft);background:#FFFFFF;box-shadow:0 1px 8px rgba(26,35,64,0.06);}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.logo-mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--gold));display:flex;align-items:center;justify-content:center;font-size:19px;}
.logo-info .name{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;letter-spacing:-.01em;color:var(--text);}
.logo-info .sub{font-size:11px;color:var(--muted);margin-top:1px;}
.survey-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border:1px solid rgba(13,122,107,0.25);border-radius:20px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--gold);text-transform:uppercase;}
.survey-badge span{width:6px;height:6px;border-radius:50%;background:var(--gold2);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.lang-wrap{display:flex;gap:4px;}
.lbtn{padding:5px 14px;border-radius:20px;border:1px solid var(--bsoft);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;background:#FFFFFF;}
.lbtn.on{background:var(--bgold);border-color:var(--gold);color:var(--gold);}

/* PROGRESS */
.pbar-wrap{padding:22px 48px 0;display:none;}
.pmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.psec{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);}
.pfrac{font-size:11px;color:var(--dim);opacity:.8;}
.ptrack{height:3px;background:rgba(26,35,64,0.07);border-radius:2px;overflow:hidden;}
.pfill{height:100%;background:linear-gradient(90deg,var(--blue),var(--gold));border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.dots{display:flex;gap:5px;margin-top:10px;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(26,35,64,0.12);transition:all .3s;}
.dot.done{background:var(--gold);}
.dot.active{background:var(--gold);width:20px;border-radius:3px;}

/* CONTENT */
.content{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:36px 48px 60px;}
.page{display:none;width:100%;max-width:740px;animation:up .3s ease;}
.page.on{display:block;}
@keyframes up{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

/* WELCOME */
.w-eyebrow{display:inline-flex;align-items:center;gap:8px;padding:5px 14px;border:1px solid rgba(13,122,107,0.18);border-radius:20px;font-size:11px;color:var(--gold);letter-spacing:.04em;margin-bottom:22px;}
.w-eyebrow i{width:6px;height:6px;border-radius:50%;background:var(--gold2);animation:blink 2s infinite;}
.w-h{font-family:'Syne',sans-serif;font-size:clamp(28px,4vw,48px);font-weight:800;line-height:1.1;letter-spacing:-.03em;margin-bottom:14px;}
.w-h em{font-style:normal;background:linear-gradient(90deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.w-p{font-size:15px;color:var(--muted);line-height:1.7;max-width:560px;margin-bottom:36px;}
.w-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:36px;}
.wstat{background:#FFFFFF;border:1px solid rgba(13,122,107,0.15);border-radius:var(--rl);padding:20px;box-shadow:0 2px 12px rgba(13,122,107,0.08);position:relative;overflow:hidden;}
.wstat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--gold));}
.wstat-n{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--gold2);margin-bottom:4px;}
.wstat-l{font-size:12px;color:var(--dim);line-height:1.4;}

.start-btn{display:inline-flex;align-items:center;gap:10px;padding:15px 32px;background:linear-gradient(135deg,var(--blue),var(--gold));border:none;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;color:#fff;cursor:pointer;transition:all .25s;box-shadow:0 4px 20px rgba(13,122,107,0.18);}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(13,122,107,0.22);}
.start-btn svg{width:17px;height:17px;}

/* QUESTION */
.qhdr{margin-bottom:26px;}
.qtag{display:inline-flex;align-items:center;gap:6px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
.qtag::before{content:'';display:block;width:16px;height:1px;background:var(--gold);}
.qtitle{font-family:'Syne',sans-serif;font-size:clamp(17px,2.5vw,25px);font-weight:700;line-height:1.3;letter-spacing:-.02em;margin-bottom:6px;}
.qdesc{font-size:13px;color:var(--muted);line-height:1.6;}
.opts{display:flex;flex-direction:column;gap:9px;}
.opts.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.opt{display:flex;align-items:center;gap:12px;padding:13px 16px;background:#FFFFFF;border:1px solid rgba(18,36,58,0.1);border-radius:var(--r);cursor:pointer;font-size:14px;color:var(--muted);transition:all .2s;box-shadow:0 1px 3px rgba(18,36,58,0.04);}
.opt:hover{color:var(--text);background:rgba(13,122,107,0.05);border-color:rgba(13,122,107,0.2);}
.opt.sel{border-color:var(--gold);background:rgba(13,122,107,0.07);color:var(--text);}
.rdot{width:18px;height:18px;min-width:18px;border-radius:50%;border:1.5px solid var(--dim);display:flex;align-items:center;justify-content:center;transition:all .2s;position:relative;}
.rdot::after{content:'';width:8px;height:8px;border-radius:50%;background:var(--bg);opacity:0;transition:opacity .2s;}
.opt.sel .rdot{border-color:var(--gold);background:var(--gold);}
.opt.sel .rdot::after{opacity:1;}
.csq{width:18px;height:18px;min-width:18px;border-radius:5px;border:1.5px solid var(--dim);display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all .2s;}
.opt.sel .csq{background:var(--gold);border-color:var(--gold);color:var(--bg);}
.scale-wrap{margin-top:4px;}
.scale-track{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;margin-bottom:7px;}
.sbtn{aspect-ratio:1;border:1px solid rgba(18,36,58,0.1);border-radius:8px;background:#FFFFFF;color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.sbtn:hover{border-color:rgba(13,122,107,0.3);color:var(--text);}
.sbtn.sel{background:linear-gradient(135deg,var(--blue),var(--gold));border-color:transparent;color:#fff;}
.scale-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--dim);}
.qta{width:100%;background:#FFFFFF;border:1px solid rgba(26,35,64,0.1);border-radius:var(--r);padding:14px 16px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);resize:vertical;min-height:110px;transition:border-color .2s;outline:none;}
.qta::placeholder{color:var(--dim);}
.qta:focus{border-color:var(--gold);}

/* NAV */
.navrow{display:flex;justify-content:space-between;align-items:center;margin-top:30px;padding-top:22px;border-top:1px solid var(--bsoft);}
.nbk{display:flex;align-items:center;gap:7px;padding:11px 20px;border:1px solid rgba(26,35,64,0.1);border-radius:100px;background:#FFFFFF;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;}
.nbk:hover{color:var(--text);border-color:rgba(255,255,255,0.15);}
.nbk:disabled{opacity:.3;cursor:not-allowed;}
.nbk svg,.nxt svg{width:15px;height:15px;}
.nxt{display:flex;align-items:center;gap:9px;padding:12px 26px;border:none;border-radius:100px;background:linear-gradient(135deg,var(--blue),var(--gold));font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:#fff;cursor:pointer;transition:all .25s;box-shadow:0 4px 16px rgba(13,122,107,0.18);}
.nxt:hover{transform:translateY(-1px);filter:brightness(1.1);}

/* THANK YOU */
.tywrap{text-align:center;padding:48px 0;}
.ty-ring{width:80px;height:80px;margin:0 auto 24px;border-radius:50%;background:rgba(13,122,107,0.08);border:1px solid rgba(13,122,107,0.2);display:flex;align-items:center;justify-content:center;}
.ty-ring svg{width:34px;height:34px;stroke:var(--gold);}
.ty-h{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;letter-spacing:-.03em;margin-bottom:12px;}
.ty-p{font-size:15px;color:var(--muted);line-height:1.7;max-width:480px;margin:0 auto 36px;}
.ty-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:580px;margin:0 auto 36px;}
.ty-crd{background:#FFFFFF;border:1px solid rgba(26,35,64,0.09);border-radius:var(--rl);padding:18px 14px;box-shadow:0 2px 8px rgba(26,35,64,0.05);}
.ty-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--gold);}
.ty-lbl{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4;}
.ty-restart{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;border:1px solid rgba(13,122,107,0.2);border-radius:100px;background:transparent;color:var(--gold);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;}
.ty-restart:hover{background:var(--bgold);}

.rtl{direction:rtl;}
.rtl .qtag::before{order:1;}
@media(max-width:640px){
  .topbar,.content,.pbar-wrap{padding-left:20px;padding-right:20px;}
  .w-stats{grid-template-columns:1fr;}
  .opts.g2{grid-template-columns:1fr;}
  .ty-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
<div class="shell">

<header class="topbar">
  <div class="logo">
    <div class="logo-mark">🛡</div>
    <div class="logo-info">
      <div class="name" id="logo-name">Social Protection Fund</div>
      <div class="sub" id="logo-sub">Digital Experience Survey</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="survey-badge" id="badge-text"><span></span>Beneficiaries</div>
    <div class="lang-wrap">
      <button class="lbtn on" onclick="setLang('en')">EN</button>
      <button class="lbtn" onclick="setLang('ar')">AR</button>
    </div>
  </div>
</header>

<div class="pbar-wrap" id="pbar">
  <div class="pmeta">
    <span class="psec" id="psec"></span>
    <span class="pfrac" id="pfrac"></span>
  </div>
  <div class="ptrack"><div class="pfill" id="pfill" style="width:0%"></div></div>
  <div class="dots" id="dots"></div>
</div>

<div class="content">

  <!-- WELCOME -->
  <div class="page on" id="pw">
    <div class="w-eyebrow"><i></i><span id="ey"></span></div>
    <h1 class="w-h" id="wh"></h1>
    <p class="w-p" id="wp"></p>
    <div class="w-stats">
      <div class="wstat"><div class="wstat-n">~5</div><div class="wstat-l" id="ws1"></div></div>
      <div class="wstat"><div class="wstat-n">11</div><div class="wstat-l" id="ws2"></div></div>
      <div class="wstat"><div class="wstat-n">5</div><div class="wstat-l" id="ws3"></div></div>
    </div>
<button class="start-btn" onclick="startSurvey()">
      <span id="start-lbl"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div>

  <!-- QUESTION -->
  <div class="page" id="pq">
    <div class="qhdr">
      <div class="qtag" id="qtag"></div>
      <h2 class="qtitle" id="qtitle"></h2>
      <p class="qdesc" id="qdesc"></p>
    </div>
    <div id="qbody"></div>
    <div class="navrow">
      <button class="nbk" id="nbk" onclick="move(-1)" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        <span id="blbl"></span>
      </button>
      <button class="nxt" onclick="move(1)">
        <span id="nlbl"></span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>

  <!-- THANK YOU -->
  <div class="page" id="pty">
    <div class="tywrap">
      <div class="ty-ring"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      <h2 class="ty-h" id="ty-h"></h2>
      <p class="ty-p" id="ty-p"></p>
      <div class="ty-grid">
        <div class="ty-crd"><div class="ty-val" id="tv1">—</div><div class="ty-lbl" id="tl1"></div></div>
        <div class="ty-crd"><div class="ty-val" id="tv2">—</div><div class="ty-lbl" id="tl2"></div></div>
        <div class="ty-crd"><div class="ty-val" id="tv3">—</div><div class="ty-lbl" id="tl3"></div></div>
      </div>
      <button class="ty-restart" onclick="goWelcome()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        <span id="rlbl"></span>
      </button>
    </div>
  </div>

</div>
</div>

<script>
const T={
en:{
  logoName:"Social Protection Fund",logoSub:"Digital Experience Survey",
  eyebrow:"Beneficiary Survey · 2026",badge:"Beneficiaries",
  wh:"Digital Experience <em>& ROI Survey</em>",
  wp:"Your feedback helps the Social Protection Fund measure the real value of its digital services — and improve them for every citizen and beneficiary across the country.",
  ws1:"minutes to complete",ws2:"focused questions",ws3:"measurement dimensions",
  startLbl:"Begin Survey",backLbl:"Back",nextLbl:"Next",submitLbl:"Submit",
  tyH:"Thank You for Your Feedback",
  tyP:"Your response helps the Social Protection Fund understand the real impact of digital services on citizens' lives and improves future investments.",
  tyLabels:["Time Saved","Satisfaction Score","Digital Impact"],
  roiL:["Low","Moderate","High","Excellent"],
  rstLbl:"Retake Survey",
  qs:[
    {sec:"Profile",q:"What is the last digital service you applied for from the Social Protection Fund?",desc:"Select the service you most recently applied for.",type:"radio",
     opts:["Social protection benefits","Social insurance services","Other"]},
    {sec:"Profile",q:"What are the digital channels you use to access Social Protection Fund services?",type:"radio",
     opts:["Himaya mobile app","Social Protection Fund website or portal","Through the call centre","In person at Social Protection Fund branches"]},
    {sec:"Access & Convenience",q:"Before digital services were available, how long did completing a request typically take?",type:"radio",
     opts:["Less than 1 day","1 – 3 days","4 – 7 days","1 – 2 weeks","More than 2 weeks","Not sure"]},
    {sec:"Access & Convenience",q:"How long does completing the same request take now using digital services?",type:"radio",
     opts:["Under 10 minutes","10 – 30 minutes","30 minutes – 2 hours","Half a day","More than a day","I still prefer visiting in person"]},
    {sec:"Service Experience",q:"How easy is it to use SPF digital services overall?",type:"scale",lo:"Very difficult",hi:"Extremely easy"},
    {sec:"Service Experience",q:"How satisfied are you with the quality and accuracy of SPF digital services?",type:"scale",lo:"Very dissatisfied",hi:"Completely satisfied"},
    {sec:"Service Experience",q:"Which benefits have you personally experienced from SPF digital services?",desc:"Select all that apply.",type:"check",
     opts:["Saved significant time","Reduced travel & transport costs","No need to take time off work","Faster approval or payment received","Greater transparency about my case or request","Services available outside office hours","Easier access for elderly or disabled family members","Better privacy and data security"]},
    {sec:"Trust & Inclusion",q:"How much do you trust the security and privacy of your personal data on SPF digital platforms?",type:"scale",lo:"No trust at all",hi:"Complete trust"},
    {sec:"Trust & Inclusion",q:"Have digital services made it easier for vulnerable or hard-to-reach groups to access SPF support?",type:"radio",
     opts:["Yes, significantly more accessible","Yes, somewhat more accessible","No noticeable change","I am not sure"]},
    {sec:"Improvement",q:"From the list below, what is the most important improvement needed for SPF digital services?",type:"check",opts:["Faster processing & response times","Simpler and more intuitive interface","Himaya mobile app","More services available online","Improved Arabic language support","Stronger data security & privacy","Better support for elderly & people with disabilities","Clearer status updates & notifications"]}
  ]
},

  wh:"استبيان <em>التجربة الرقمية والعائد</em>",
  wp:"ملاحظاتك تساعد صندوق الحماية الاجتماعية على قياس القيمة الحقيقية لخدماته الرقمية وتحسينها لكل مواطن ومستفيد في سلطنة عمان.",
  ws1:"دقائق للإجابة",ws2:"سؤالاً محورياً",ws3:"أبعاد قياس",
  startLbl:"ابدأ الاستبيان",backLbl:"رجوع",nextLbl:"التالي",submitLbl:"إرسال",

  tyLabels:["الوقت الموفَّر","درجة الرضا","الأثر الرقمي"],
  roiL:["منخفض","متوسط","مرتفع","ممتاز"],
  rstLbl:"إعادة الاستبيان",
  qs:[
    {sec:"الملف الشخصي",q:"ما آخر خدمة رقمية قدمت عليها من خدمات صندوق الحماية الاجتماعية؟",desc:"اختر الخدمة التي قدمت عليها مؤخراً.",type:"radio",
     opts:["منافع الحماية الاجتماعية","خدمات التأمين الاجتماعية","أخرى"]},
    {sec:"الملف الشخصي",q:"ما القنوات الرقمية التي تصل عن طريقها لخدمات صندوق الحماية الاجتماعية؟",type:"radio",
     opts:["تطبيق الهاتف حماية","موقع أو بوابة صندوق الحماية الاجتماعية","عن طريق مركز الاتصال","عبر فروع صندوق الحماية الاجتماعية"]},

    {sec:"الوصول والسهولة",q:"كم يستغرق إنجاز الطلب ذاته الآن عبر الخدمات الرقمية؟",type:"radio",
     opts:["أقل من ١٠ دقائق","١٠ – ٣٠ دقيقة","٣٠ دقيقة – ساعتين","نصف يوم","أكثر من يوم","ما زلت أفضل الحضور الشخصي"]},
    {sec:"تجربة الخدمة",q:"ما مدى سهولة استخدام الخدمات الرقمية لصندوق الحماية الاجتماعية بشكل عام؟",type:"scale",lo:"صعبة جداً",hi:"سهلة للغاية"},
    {sec:"تجربة الخدمة",q:"ما مدى رضاك عن جودة ودقة الخدمات الرقمية لصندوق الحماية الاجتماعية؟",type:"scale",lo:"غير راضٍ تماماً",hi:"راضٍ تماماً"},
    {sec:"تجربة الخدمة",q:"ما الفوائد التي اختبرتها شخصياً من الخدمات الرقمية لصندوق الحماية الاجتماعية؟",desc:"اختر كل ما ينطبق.",type:"check",
     opts:["وفرت وقتاً كبيراً","قلصت تكاليف التنقل","لا حاجة للغياب عن العمل","موافقة أو صرف أسرع","شفافية أكبر بشأن طلبي أو حالتي","الخدمات متاحة خارج ساعات العمل","أسهل لكبار السن أو ذوي الإعاقة","حماية أفضل للخصوصية والبيانات"]},
    {sec:"الثقة والشمول",q:"ما مدى ثقتك في أمان وخصوصية بياناتك الشخصية على منصات صندوق الحماية الاجتماعية الرقمية؟",type:"scale",lo:"لا ثقة على الإطلاق",hi:"ثقة كاملة"},
    {sec:"الثقة والشمول",q:"هل أتاحت الخدمات الرقمية للفئات الهشة وصعبة الوصول الحصول على دعم صندوق الحماية الاجتماعية بشكل أيسر؟",type:"radio",
     opts:["نعم، أكثر سهولة بكثير","نعم، أكثر سهولة إلى حد ما","لا تغيير ملحوظ","لست متأكداً"]},
    {sec:"التحسينات",q:"من القائمة أدناه، ما أهم تحسين مطلوب للخدمات الرقمية لصندوق الحماية الاجتماعية؟",type:"check",opts:["أوقات معالجة واستجابة أسرع","واجهة أبسط وأسهل في الاستخدام","تطبيق الهاتف حماية","توفير المزيد من الخدمات إلكترونياً","تحسين دعم اللغة العربية","تعزيز أمن البيانات والخصوصية","دعم أفضل لكبار السن وذوي الإعاقة","إشعارات وتحديثات أوضح عن حالة الطلب"]}
  ]
}
};

let lang='en',cur=0,ans={};

function setLang(l){
  lang=l;
  document.querySelectorAll('.lbtn').forEach(b=>b.classList.toggle('on',b.textContent===l.toUpperCase()));
  document.body.classList.toggle('rtl',l==='ar');
  const d=T[l];
  document.getElementById('logo-name').textContent=d.logoName;
  document.getElementById('logo-sub').textContent=d.logoSub;
  document.getElementById('ey').textContent=d.eyebrow;
  document.getElementById('badge-text').innerHTML='<span></span>'+d.badge;
  document.getElementById('wh').innerHTML=d.wh;
  document.getElementById('wp').textContent=d.wp;
  document.getElementById('ws1').textContent=d.ws1;
  document.getElementById('ws2').textContent=d.ws2;
  document.getElementById('ws3').textContent=d.ws3;

  document.getElementById('start-lbl').textContent=d.startLbl;
  document.getElementById('blbl').textContent=d.backLbl;
  document.getElementById('nlbl').textContent=d.nextLbl;
  document.getElementById('ty-h').textContent=d.tyH;
  document.getElementById('ty-p').textContent=d.tyP;
  document.getElementById('tl1').textContent=d.tyLabels[0];
  document.getElementById('tl2').textContent=d.tyLabels[1];
  document.getElementById('tl3').textContent=d.tyLabels[2];
  document.getElementById('rlbl').textContent=d.rstLbl;
  if(document.getElementById('pq').classList.contains('on'))renderQ();
}

function show(id){['pw','pq','pty'].forEach(p=>document.getElementById(p).classList.toggle('on',p===id));}

function startSurvey(){
  cur=0;ans={};show('pq');
  document.getElementById('pbar').style.display='block';
  buildDots();renderQ();
}

function buildDots(){
  const wrap=document.getElementById('dots');wrap.innerHTML='';
  T[lang].qs.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===cur?' active':i<cur?' done':'');
    d.id='d'+i;wrap.appendChild(d);
  });
}
function updDots(){
  T[lang].qs.forEach((_,i)=>{
    const d=document.getElementById('d'+i);
    if(d)d.className='dot'+(i===cur?' active':i<cur?' done':'');
  });
}

function renderQ(){
  const qs=T[lang].qs,q=qs[cur];
  document.getElementById('qtag').textContent=q.sec;
  document.getElementById('qtitle').textContent=q.q;
  document.getElementById('qdesc').textContent=q.desc||'';
  const pct=Math.round(cur/qs.length*100);
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('pfrac').textContent=(cur+1)+' / '+qs.length;
  document.getElementById('psec').textContent=q.sec;
  document.getElementById('nbk').disabled=cur===0;
  document.getElementById('nlbl').textContent=cur===qs.length-1?T[lang].submitLbl:T[lang].nextLbl;
  updDots();
  const body=document.getElementById('qbody');body.innerHTML='';
  if(q.type==='radio'){
    const w=document.createElement('div');w.className='opts'+(q.opts.length<=4?' g2':'');
    q.opts.forEach((o,i)=>{
      const sel=ans[cur]===i,el=document.createElement('div');
      el.className='opt'+(sel?' sel':'');
      el.innerHTML=`<div class="rdot"></div><span>${o}</span>`;
      el.onclick=()=>{ans[cur]=i;w.querySelectorAll('.opt').forEach(e=>e.className='opt');el.className='opt sel';};
      w.appendChild(el);
    });body.appendChild(w);
  } else if(q.type==='check'){
    const w=document.createElement('div');w.className='opts';
    const pk=ans[cur]||[];
    q.opts.forEach((o,i)=>{
      const sel=pk.includes(i),el=document.createElement('div');
      el.className='opt'+(sel?' sel':'');
      el.innerHTML=`<div class="csq">${sel?'✓':''}</div><span>${o}</span>`;
      el.onclick=()=>{
        if(!ans[cur])ans[cur]=[];
        const arr=ans[cur],idx=arr.indexOf(i);
        if(idx>-1){arr.splice(idx,1);el.className='opt';el.querySelector('.csq').textContent='';}
        else{arr.push(i);el.className='opt sel';el.querySelector('.csq').textContent='✓';}
      };w.appendChild(el);
    });body.appendChild(w);
  } else if(q.type==='scale'){
    const w=document.createElement('div');w.className='scale-wrap';
    const tr=document.createElement('div');tr.className='scale-track';
    for(let i=1;i<=10;i++){
      const b=document.createElement('button');b.className='sbtn'+(ans[cur]===i?' sel':'');
      b.textContent=i;
      b.onclick=()=>{ans[cur]=i;tr.querySelectorAll('.sbtn').forEach((s,idx)=>s.className='sbtn'+(idx+1===i?' sel':''));};
      tr.appendChild(b);
    }
    const lbl=document.createElement('div');lbl.className='scale-labels';lbl.innerHTML=`<span>${q.lo}</span><span>${q.hi}</span>`;
    w.appendChild(tr);w.appendChild(lbl);body.appendChild(w);
  } else if(q.type==='textarea'){
    const ta=document.createElement('textarea');ta.className='qta';ta.placeholder=q.placeholder;ta.value=ans[cur]||'';
    ta.oninput=()=>{ans[cur]=ta.value;};body.appendChild(ta);
  }
}

function move(dir){
  const qs=T[lang].qs;
  if(dir===1&&cur===qs.length-1){submit();return;}
  cur=Math.max(0,Math.min(qs.length-1,cur+dir));renderQ();
}

function submit(){
  show('pty');document.getElementById('pbar').style.display='none';
  const scales=Object.values(ans).filter(v=>typeof v==='number'&&v>=1&&v<=10);
  const avg=scales.length?Math.round(scales.reduce((a,b)=>a+b,0)/scales.length*10):Math.round(62+Math.random()*28);
  const timeSaved=["<30 min","1–2 hrs","2–4 hrs","4+ hrs"][Math.floor(Math.random()*4)];
  const idx=avg<40?0:avg<60?1:avg<80?2:3;
  document.getElementById('tv1').textContent=timeSaved;
  document.getElementById('tv2').textContent=avg+'%';
  document.getElementById('tv3').textContent=T[lang].roiL[idx];
}

function goWelcome(){cur=0;ans={};show('pw');document.getElementById('pbar').style.display='none';}
setLang('en');
</script>
</body>
